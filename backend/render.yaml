services:
  - type: web
    name: django-react-full-stack-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # Replace with your actual Vercel URL
      - key: DB_NAME
        fromDatabase:
          name: django-react-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: django-react-db
          property: user
      - key: DB_PWD
        fromDatabase:
          name: django-react-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: django-react-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: django-react-db
          property: port
    plan: free

databases:
  - name: django-react-db
    plan: free
